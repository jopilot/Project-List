<!DOCTYPE html>
<html lang="ko" class="h-full bg-slate-950 text-slate-100">
  <head>
    <meta charset="UTF-8" />
    <!-- 모바일 환경에서 올바른 비율로 렌더링되도록 뷰포트 설정을 제공합니다. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 어플리케이션의 타이틀 및 SEO 메타 태그 정의 -->
    <title>PROJEX AI - 글로벌 프로젝트 대시보드 & 스마트 챗봇</title>
    <meta name="description" content="글로벌 인프라 및 산업 프로젝트 정보 PDF를 Gemini AI로 정밀 추출하고, 스마트 대시보드를 통해 체계적으로 CRUD 관리하며, 실시간 데이터 연동 AI 컨설턴트 챗봇과 전문적인 상담을 나눌 수 있는 프리미엄 대시보드 서비스입니다." />
    
    <!-- 파비콘 및 외부 스타일시트 설정 (Lucide 및 폰트) -->
    <!-- 프리미엄 디자인을 위한 모던 영문/한글 폰트인 Inter와 Outfit 폰트를 불러옵니다. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  
  <body class="h-full antialiased selection:bg-brand-500 selection:text-white font-sans">
    <!-- React 어플리케이션이 마운트되어 동적으로 화면을 구성할 루트 컨테이너입니다. -->
    <div id="root" class="min-h-full"></div>
    
    <!-- React와 TypeScript 소스 코드를 빌드하고 진입점으로 삼을 스크립트 연결입니다. -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
